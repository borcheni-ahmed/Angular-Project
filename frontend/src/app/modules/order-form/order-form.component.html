<div style="display:flex; flex-direction:column; gap:16px;">

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div>
      <label style="color:#94a3b8; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">
        Order Date <span style="color:#f87171;">*</span>
      </label>
      <input type="date" [(ngModel)]="form.orderDate"
             style="width:100%; box-sizing:border-box; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 14px; color:white; font-size:14px; outline:none;"/>
    </div>
    <div>
      <label style="color:#94a3b8; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">
        Expected Delivery <span style="color:#f87171;">*</span>
      </label>
      <input type="date" [(ngModel)]="form.expectedDeliveryDate"
             style="width:100%; box-sizing:border-box; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 14px; color:white; font-size:14px; outline:none;"/>
    </div>
  </div>

  <!-- PO Number — was missing, required by API -->
  <div>
    <label style="color:#94a3b8; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">
      PO Number <span style="color:#f87171;">*</span>
    </label>
    <input type="text" [(ngModel)]="form.customerPurchaseOrderNumber" placeholder="e.g. PO-12345"
           style="width:100%; box-sizing:border-box; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 14px; color:white; font-size:14px; outline:none;"/>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div>
      <label style="color:#94a3b8; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">Comments</label>
      <textarea [(ngModel)]="form.comments" rows="2" placeholder="Any comments..."
                style="width:100%; box-sizing:border-box; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 14px; color:white; font-size:14px; outline:none; resize:vertical;"></textarea>
    </div>
    <div>
      <label style="color:#94a3b8; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px;">Delivery Instructions</label>
      <textarea [(ngModel)]="form.deliveryInstructions" rows="2" placeholder="Special instructions..."
                style="width:100%; box-sizing:border-box; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 14px; color:white; font-size:14px; outline:none; resize:vertical;"></textarea>
    </div>
  </div>

  <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
    <input type="checkbox" [(ngModel)]="form.isUndersupplyBackordered"
           style="width:16px; height:16px; accent-color:#6366f1; cursor:pointer;"/>
    <span style="color:#94a3b8; font-size:14px;">Allow backorder if undersupplied</span>
  </label>

  <div style="display:flex; justify-content:flex-end; gap:10px; padding-top:4px;">
    <button (click)="cancel()"
            style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer;">
      Cancel
    </button>
    <button (click)="submit()"
            [disabled]="saving"
            [style.opacity]="saving ? '0.6' : '1'"
            [style.cursor]="saving ? 'not-allowed' : 'pointer'"
            style="background:linear-gradient(135deg,#6366f1,#4f46e5); border:none; color:white; padding:10px 24px; border-radius:10px; font-size:14px; font-weight:600;">
      {{ saving ? 'Saving...' : (isEdit ? 'Save Changes' : 'Place Order') }}
    </button>
  </div>

</div>
